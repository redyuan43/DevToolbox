<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络SSH扫描器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .progress {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .progress.active {
            display: block;
        }

        .progress-text {
            color: #666;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        .results {
            margin-top: 30px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .results h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .device-list {
            display: grid;
            gap: 15px;
        }

        .device-card {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .device-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .device-card.success {
            border-left-color: #4caf50;
            background: #f1f8e9;
        }

        .device-card.failed {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .device-card.inactive {
            border-left-color: #9e9e9e;
            background: #fafafa;
        }

        .device-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: center;
        }

        .device-label {
            font-weight: 500;
            color: #666;
        }

        .device-value {
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.success {
            background: #4caf50;
            color: white;
        }

        .status-badge.failed {
            background: #f44336;
            color: white;
        }

        .status-badge.inactive {
            background: #9e9e9e;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            opacity: 0.3;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 网络SSH扫描器</h1>
            <p>快速扫描局域网内的SSH设备</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="network">网络段 (CIDR格式)</label>
                <input type="text" id="network" placeholder="例如: 192.168.1.0/24" value="192.168.100.0/24">
            </div>

            <div class="form-group">
                <label for="username">SSH用户名</label>
                <input type="text" id="username" placeholder="输入SSH用户名">
            </div>

            <div class="form-group">
                <label for="password">SSH密码</label>
                <input type="password" id="password" placeholder="输入SSH密码">
            </div>

            <div class="button-group">
                <button id="scanBtn" onclick="startScan()">开始扫描</button>
                <button id="stopBtn" class="stop" onclick="stopScan()" style="display: none;">停止扫描</button>
            </div>

            <div id="progress" class="progress">
                <div class="progress-text" id="progressText">正在扫描...</div>
                <div class="progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>

            <div id="results" class="results">
                <h2>扫描结果</h2>
                <div id="deviceList" class="device-list"></div>
            </div>
        </div>
    </div>

    <script>
        let scanInterval = null;

        function startScan() {
            const network = document.getElementById('network').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            // 显示进度条
            document.getElementById('progress').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('scanBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('deviceList').innerHTML = '';

            // 发送扫描请求
            fetch('/scan', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    network: network,
                    username: username,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                    resetUI();
                } else {
                    // 开始轮询状态
                    scanInterval = setInterval(checkStatus, 1000);
                }
            })
            .catch(error => {
                alert('扫描请求失败: ' + error);
                resetUI();
            });
        }

        function stopScan() {
            fetch('/stop', {
                method: 'POST'
            })
            .then(() => {
                if (scanInterval) {
                    clearInterval(scanInterval);
                }
                resetUI();
            });
        }

        function checkStatus() {
            fetch('/status')
            .then(response => response.json())
            .then(data => {
                console.log('Status:', data);  // 调试日志

                // 更新进度文本
                document.getElementById('progressText').textContent = data.progress || '扫描中...';

                // 实时显示结果
                if (data.results && data.results.length > 0) {
                    displayResults(data.results);
                }

                // 如果扫描完成
                if (!data.running) {
                    clearInterval(scanInterval);
                    scanInterval = null;

                    // 确保显示最终结果
                    if (data.results) {
                        displayResults(data.results);
                    }

                    // 更新UI但保持进度条和结果显示
                    document.getElementById('scanBtn').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';

                    // 延迟隐藏进度条，让用户看到完成状态
                    setTimeout(() => {
                        document.getElementById('progress').classList.remove('active');
                    }, 2000);
                }
            })
            .catch(error => {
                console.error('Status check error:', error);
            });
        }

        function displayResults(results) {
            document.getElementById('results').classList.add('active');
            const deviceList = document.getElementById('deviceList');

            if (results.length === 0) {
                deviceList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <p>未发现可访问的设备</p>
                    </div>
                `;
                return;
            }

            deviceList.innerHTML = results.map(device => {
                let statusClass = 'inactive';
                let statusText = '未知';

                if (device.ssh_success) {
                    statusClass = 'success';
                    statusText = '连接成功';
                } else if (device.ssh_open) {
                    statusClass = 'failed';
                    statusText = '连接失败';
                } else {
                    statusClass = 'inactive';
                    statusText = 'SSH端口关闭';
                }

                return `
                    <div class="device-card ${statusClass}">
                        <div class="device-info">
                            <span class="device-label">IP地址:</span>
                            <span class="device-value">${device.ip}</span>

                            <span class="device-label">MAC地址:</span>
                            <span class="device-value">${device.mac}</span>

                            <span class="device-label">SSH端口:</span>
                            <span class="device-value">${device.ssh_open ? '✓ 开放' : '✗ 关闭'}</span>

                            <span class="device-label">状态:</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>

                            ${device.ssh_success ? `
                                <span class="device-label">主机名:</span>
                                <span class="device-value">${device.hostname}</span>
                            ` : device.message ? `
                                <span class="device-label">备注:</span>
                                <span class="device-value">${device.message}</span>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function resetUI() {
            // 不立即隐藏进度条，让用户看到完成状态
            document.getElementById('scanBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        }
    </script>
</body>
</html>
