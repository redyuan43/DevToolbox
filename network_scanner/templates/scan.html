<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络SSH扫描器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button.fast {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }

        button.stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .output-container {
            margin-top: 30px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            display: none;
        }

        .output-container.active {
            display: block;
        }

        .output-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #00ff00;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .status-bar {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .status-bar.active {
            display: block;
        }

        .status-text {
            color: #666;
            font-size: 14px;
        }

        .progress-container {
            margin-top: 15px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #333;
            margin-top: 5px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .scan-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 10px;
        }

        .scan-type-badge.normal {
            background: #4caf50;
            color: white;
        }

        .scan-type-badge.fast {
            background: #2196f3;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 网络SSH扫描器</h1>
            <p>支持普通扫描和快速扫描（ARP优化）两种模式</p>
        </div>

        <div class="content">
            <div class="form-row">
                <div class="form-group">
                    <label for="network">网络段 (CIDR格式)</label>
                    <input type="text" id="network" placeholder="例如: 192.168.1.0/24" value="192.168.100.0/24">
                </div>
                <div class="form-group">
                    <label for="username">SSH用户名</label>
                    <input type="text" id="username" placeholder="输入SSH用户名">
                </div>
                <div class="form-group">
                    <label for="password">SSH密码</label>
                    <input type="password" id="password" placeholder="输入SSH密码">
                </div>
            </div>

            <div class="button-group">
                <button id="normalScanBtn" onclick="startNormalScan()">🔍 普通扫描</button>
                <button id="fastScanBtn" class="fast" onclick="startFastScan()">⚡ 快速扫描</button>
                <button id="stopBtn" class="stop" onclick="stopScan()" style="display: none;">⏹ 停止扫描</button>
            </div>

            <div id="statusBar" class="status-bar">
                <div class="status-text">
                    <span class="spinner"></span>
                    <span id="statusText">正在扫描...</span>
                    <span id="scanTypeBadge" class="scan-type-badge"></span>
                </div>
            </div>

            <div id="progressContainer" class="progress-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="progressText" class="progress-text">0%</div>
            </div>

            <div id="outputContainer" class="output-container">
                <pre id="outputText" class="output-text"></pre>
            </div>
        </div>
    </div>

    <script>
        let statusInterval = null;
        let lastOutputLength = 0;

        function getFormData() {
            const network = document.getElementById('network').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return null;
            }

            return { network, username, password };
        }

        function startNormalScan() {
            const data = getFormData();
            if (!data) return;

            startScan('/api/scan/normal', data, 'normal');
        }

        function startFastScan() {
            const data = getFormData();
            if (!data) return;

            startScan('/api/scan/fast', data, 'fast');
        }

        function startScan(endpoint, data, type) {
            // 重置输出和进度
            document.getElementById('outputText').textContent = '';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '0%';
            lastOutputLength = 0;

            // 显示输出容器、状态栏和进度条
            document.getElementById('outputContainer').classList.add('active');
            document.getElementById('statusBar').classList.add('active');
            document.getElementById('progressContainer').classList.add('active');

            // 更新按钮状态
            document.getElementById('normalScanBtn').style.display = 'none';
            document.getElementById('fastScanBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';

            // 设置扫描类型徽章
            const badge = document.getElementById('scanTypeBadge');
            badge.className = `scan-type-badge ${type}`;
            badge.textContent = type === 'normal' ? '普通扫描' : '快速扫描';

            // 发送扫描请求
            fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                    resetUI();
                } else {
                    // 开始轮询状态
                    statusInterval = setInterval(checkStatus, 500);
                }
            })
            .catch(error => {
                alert('扫描请求失败: ' + error);
                resetUI();
            });
        }

        function parseProgress(output) {
            // 解析输出中的进度信息
            const lines = output.split('\n');
            let progress = 0;
            let currentTask = '';

            for (let line of lines) {
                // 查找进度条信息
                const progressMatch = line.match(/进度:.*?(\d+)%.*?\((\d+)\/(\d+)\)/);
                if (progressMatch) {
                    progress = parseInt(progressMatch[1]);
                    currentTask = `正在扫描 ${progressMatch[2]}/${progressMatch[3]}`;
                }

                // 查找其他进度信息
                if (line.includes('开始扫描SSH端口')) {
                    currentTask = '正在扫描SSH端口...';
                } else if (line.includes('尝试连接')) {
                    currentTask = '正在尝试SSH连接...';
                } else if (line.includes('扫描完成')) {
                    progress = 100;
                    currentTask = '扫描完成';
                }
            }

            return { progress, currentTask };
        }

        function checkStatus() {
            fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                // 更新输出
                const outputText = document.getElementById('outputText');
                if (data.output && data.output.length > lastOutputLength) {
                    // 只添加新的输出内容
                    const newContent = data.output.substring(lastOutputLength);

                    // 逐行添加内容以实现实时效果
                    const newLines = newContent.split('\n');
                    for (let line of newLines) {
                        if (line.trim()) {
                            outputText.textContent += line + '\n';
                        }
                    }

                    lastOutputLength = data.output.length;

                    // 解析并更新进度
                    const progressInfo = parseProgress(data.output);
                    if (progressInfo.progress > 0) {
                        document.getElementById('progressFill').style.width = progressInfo.progress + '%';
                        document.getElementById('progressText').textContent = progressInfo.progress + '%';
                    }
                    if (progressInfo.currentTask) {
                        document.getElementById('statusText').textContent = progressInfo.currentTask;
                    }

                    // 自动滚动到底部
                    const container = document.getElementById('outputContainer');
                    container.scrollTop = container.scrollHeight;
                }

                // 如果扫描完成
                if (data.complete || !data.running) {
                    clearInterval(statusInterval);
                    statusInterval = null;

                    // 完成进度条
                    document.getElementById('progressFill').style.width = '100%';
                    document.getElementById('progressText').textContent = '100%';
                    document.getElementById('statusText').textContent = '扫描完成';

                    // 延迟后重置UI
                    setTimeout(() => {
                        document.getElementById('statusBar').classList.remove('active');
                        document.getElementById('progressContainer').classList.remove('active');
                        resetUI();
                    }, 2000);
                }
            })
            .catch(error => {
                console.error('Status check error:', error);
            });
        }

        function stopScan() {
            fetch('/api/stop', {
                method: 'POST'
            })
            .then(() => {
                if (statusInterval) {
                    clearInterval(statusInterval);
                    statusInterval = null;
                }
                document.getElementById('statusText').textContent = '扫描已停止';
                setTimeout(() => {
                    document.getElementById('statusBar').classList.remove('active');
                    resetUI();
                }, 1000);
            });
        }

        function resetUI() {
            document.getElementById('normalScanBtn').style.display = 'block';
            document.getElementById('fastScanBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        }
    </script>
</body>
</html>
